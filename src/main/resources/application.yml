server:
  port: 8080

spring:
  application:
    name: fun-ai-agent-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fun_ai_agent}
    username: ${DB_USERNAME:funai_agent}
    password: ${DB_PASSWORD:Ss123456!}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${DB_MIGRATION_ENABLED:true}
    create-schemas: true
    default-schema: agent_cfg
    schemas: agent_cfg
    baseline-on-migrate: ${DB_BASELINE_ON_MIGRATE:true}
    baseline-version: ${DB_BASELINE_VERSION:1}

management:
  endpoints:
    web:
      exposure:
        include: health,info

plane:
  base-url: ${PLANE_BASE_URL:http://localhost:8100}
  timeout-seconds: ${PLANE_TIMEOUT_SECONDS:30}

gateway:
  base-url: ${GATEWAY_BASE_URL:https://api.ai.fun.tv/v1}
  token: ${GATEWAY_TOKEN:}
  timeout-seconds: ${GATEWAY_TIMEOUT_SECONDS:15}
  models-cache-seconds: ${GATEWAY_MODELS_CACHE_SECONDS:30}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://studio.fun.tv}
